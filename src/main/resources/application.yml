spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/firstclub_membership
    username: engine_admin
    password: secret_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080